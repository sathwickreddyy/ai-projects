services:
  backend:
    build: ./backend
    ports:
      - "18000:8000"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/arch_viewer.db
      SKILLS_DIR: /skills
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./skills:/skills
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "13000:13000"
    environment:
      VITE_API_URL: http://localhost:18000
      VITE_WS_URL: ws://localhost:18000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
