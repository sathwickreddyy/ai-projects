services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: arch
      POSTGRES_PASSWORD: arch_secret
      POSTGRES_DB: arch_platform
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arch -d arch_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://arch:arch_secret@postgres:5432/arch_platform
      PROJECTS_DIR: /projects
      PYTHONUNBUFFERED: "1"
      CLAUDE_AUTH_MODE: ${CLAUDE_AUTH_MODE:-api}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-anthropic.claude-sonnet-4-5-v1}
    volumes:
      - ./backend:/app
      - ./projects:/projects:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  # mcp-server uses stdio transport — it is NOT a Docker service.
  # Claude Code launches it as a subprocess. See .claude.json for config.

  watcher:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://arch:arch_secret@postgres:5432/arch_platform
      PROJECTS_DIR: /projects
    volumes:
      - ./backend:/app
      - ./projects:/projects:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m app.services.watcher

volumes:
  postgres_data:
