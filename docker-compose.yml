services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arch_viewer
      POSTGRES_USER: arch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "arch", "-d", "arch_viewer"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "18000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://arch:${POSTGRES_PASSWORD:-dev}@postgres:5432/arch_viewer
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "13000:13000"
    environment:
      VITE_API_URL: http://localhost:18000
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
